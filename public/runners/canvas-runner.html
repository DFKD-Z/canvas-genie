<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvas Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    #canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    function normalizeUserCode(code) {
      var raw = typeof code === 'string' ? code : '';
      var text = raw.replace(/^\uFEFF/, '').trim();
      if (!text) return '';

      var fenceMatch = text.match(/```(?:javascript|js)?\s*([\s\S]*?)```/i);
      if (fenceMatch && fenceMatch[1]) {
        text = fenceMatch[1].trim();
      } else {
        text = text.replace(/^```[\w]*\n?/, '').replace(/\n?```\s*$/, '').trim();
      }

      if (text[0] === '{' && text.indexOf('"code"') !== -1) {
        try {
          var parsedObj = JSON.parse(text);
          if (parsedObj && typeof parsedObj.code === 'string') {
            text = parsedObj.code.trim();
          }
        } catch (_) {}
      }

      if ((text[0] === '"' && text[text.length - 1] === '"') || (text[0] === "'" && text[text.length - 1] === "'")) {
        try {
          if (text[0] === "'") {
            text = '"' + text.slice(1, -1).replace(/\\'/g, "'").replace(/"/g, '\\"') + '"';
          }
          var parsedStr = JSON.parse(text);
          if (typeof parsedStr === 'string') {
            text = parsedStr.trim();
          }
        } catch (_) {}
      }

      // 兼容 `html + 脚本代码` 这类返回
      var firstLine = (text.split('\n')[0] || '').trim();
      if (/^html$/i.test(firstLine)) {
        text = text.split('\n').slice(1).join('\n').trim();
      }
      var scriptMatch = text.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
      if (scriptMatch && scriptMatch[1]) {
        text = scriptMatch[1].trim();
      }

      return text;
    }

    function runUserCode(canvas, code, retryCount) {
      retryCount = retryCount || 0;
      if (!canvas || typeof code !== 'string') return;
      var w = canvas.clientWidth;
      var h = canvas.clientHeight;
      if ((w === 0 || h === 0) && retryCount < 20) {
        requestAnimationFrame(function () { runUserCode(canvas, code, retryCount + 1); });
        return;
      }

      w = w || 300;
      h = h || 150;
      canvas.width = w;
      canvas.height = h;

      var normalized = normalizeUserCode(code);
      if (!normalized) return;

      try {
        // Primary path: function body execution (strict mode compatible)
        var fn = new Function('"use strict";\n' + normalized);
        fn();
      } catch (err1) {
        try {
          // Fallback: wrap in block for engines with strict body parsing quirks
          var wrapped = '"use strict";\n{\n' + normalized + '\n}';
          var wrappedFn = new Function(wrapped);
          wrappedFn();
        } catch (err2) {
          console.error('[Canvas Genie]', err2, '\n[Code Preview]', normalized.slice(0, 240));
        }
      }
    }

    window.addEventListener('message', function (e) {
      var canvas = document.getElementById('canvas');
      if (e.data?.type === 'RUN_CODE' && typeof e.data.code === 'string') {
        requestAnimationFrame(function () {
          runUserCode(canvas, e.data.code);
        });
      } else if (e.data?.type === 'GET_IMAGE' && e.source) {
        try {
          var dataUrl = canvas ? canvas.toDataURL('image/png') : '';
          e.source.postMessage({ type: 'IMAGE_DATA', dataUrl: dataUrl }, e.origin);
        } catch (err) {
          e.source.postMessage({ type: 'IMAGE_DATA', dataUrl: '', error: String(err) }, e.origin);
        }
      }
    });
  </script>
</body>
</html>
